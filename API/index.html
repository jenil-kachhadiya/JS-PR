<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
</head>

<body class="min-h-screen flex items-center justify-center 
bg-[url('img/background.png')] 
bg-cover bg-center bg-no-repeat overflow-hidden">


    <div class="bg-gradient-to-br from-yellow-400 to-orange-600 
                backdrop-blur-lg text-white 
                w-[80%] max-w-md rounded-2xl 
                p-10 text-center bg-transparent shadow-[0_10px_20px_rgba(0,0,0)]">


        <div class="flex items-center gap-4">
            <input id="city" type="text" placeholder="Enter city name" class="flex-1 h-14 px-6 rounded-full 
                       text-gray-700 outline-none text-lg">

            <button id="btn" class="h-14 w-14 rounded-full bg-white text-black flex items-center justify-center">
                <i class="fa fa-search text-lg"></i>
            </button>
        </div>

        <!-- WEATHER -->
        <div class="mt-8">
            <img src="img/weather1.png" class="w-20 mx-auto weather-icon">

            <h1 class="text-6xl font-medium mt-4 temp">22°c</h1>
            <h2 class="text-3xl city">Tunisia</h2>

            <div class="flex justify-between mt-16 px-4">

                <div class="flex items-center gap-3 text-left">
                    <img src="img/weather.png" class="w-10">
                    <div>
                        <p class="text-2xl humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>

                <div class="flex items-center gap-3 text-left">
                    <img src="img/wind.png" class="w-10">
                    <div>
                        <p class="text-2xl wind">5 Km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
