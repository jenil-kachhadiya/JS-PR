<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>JS EXAM - Ecommrance</title>
</head>

<body class="bg-slate-100">
    <div class="min-h-screen">
        <div
            class="w-full bg-gradient-to-r from-orange-400 to-orange-500 text-slate-800 flex items-center justify-evenly px-6 py-2">

            <div class="flex gap-3 text-3xl font-semibold">
                <img class="w-50 h-20 border-2 rounded-full" src="economic2.jpg" alt="">
            </div>

            <select id="sortSelect" class="border-2 border-slate-700 rounded-lg px-3 py-2 text-sm bg-slate-100 shadow-sm bg-neutral-secondary-medium focus:ring-brand focus:border-brand">
                <option value="">Sort</option>
                <option value="asc" class="border rounded-xl">Price: Low → High</option>
                <option value="desc">Price: High → Low</option>
            </select>


            <input id="searchInput" type="text" placeholder="Search product..."
                class="border-2 border-slate-800 rounded-lg px-3 py-2 text-sm" />
            <button id="openModal"
                class="bg-blue-600 border-2 border-slate-200 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium">
                <i class="ri-add-large-line"></i> Add New Product
            </button>
        </div>

        <div id="productContainer" class="mt-3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-slate-800">Add New Product</h2>
                <button id="closeModal" class="text-slate-400 hover:text-slate-600">✕</button>
            </div>

            <form id="productForm" class="space-y-4">

                <input id="name" type="text" placeholder="Product Name"
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" required />

                <input id="image" type="url" placeholder="Image URL"
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" required />

                <div class="grid grid-cols-2 gap-3">
                    <input id="price" type="number" placeholder="Price"
                        class="border border-slate-200 rounded-lg px-3 py-2 text-sm" required />

                    <input id="stock" type="number" placeholder="Stock"
                        class="border border-slate-200 rounded-lg px-3 py-2 text-sm" required />
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-sm font-medium">
                    Save Product
                </button>

            </form>
        </div>
    </div>

    <script src="style.js"></script>
</body>

</html>
